<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hephaestus Systems - Business Launch</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background elements */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: multiply;
            filter: blur(70px);
            animation: float 8s ease-in-out infinite;
        }

        .blob1 {
            width: 400px;
            height: 400px;
            background: #ff6b9d;
            top: -100px;
            left: -100px;
        }

        .blob2 {
            width: 300px;
            height: 300px;
            background: #00d4ff;
            top: 50%;
            right: -100px;
            animation-delay: 2s;
        }

        .blob3 {
            width: 350px;
            height: 350px;
            background: #ffd700;
            bottom: -100px;
            left: 30%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(50px, -50px); }
            66% { transform: translate(-30px, 30px); }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            max-width: 800px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 30px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideDown 1s ease-out;
        }

        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 40px;
            animation: fadeIn 1.5s ease-out;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 50px;
            background: #ff6b9d;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            animation: slideUp 1s ease-out;
            cursor: pointer;
            border: none;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
            background: #ff4757;
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .container {
                padding: 20px;
            }
        }

        /* Basketball styles */
        .basketball {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff9900, #ff6600);
            box-shadow: inset -2px -2px 5px rgba(0, 0, 0, 0.3), 0 8px 16px rgba(0, 0, 0, 0.2);
            cursor: grab;
            user-select: none;
            z-index: 1000;
        }

        .basketball::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: black;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .basketball::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 100%;
            background: black;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .basketball:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="basketball" id="basketball"></div>

    <div class="container">
        <h1>Hephaestus Systems<br>starts business today!</h1>
        <p class="subtitle">Automation • Innovation • Excellence</p>
        <button class="cta-button" onclick="alert('🚀 Welcome to Hephaestus Systems!')">Get Started</button>
    </div>

    <script>
        // Basketball Physics Engine with realistic gravity
        class Basketball {
            constructor(element) {
                this.element = element;
                this.x = window.innerWidth / 2;
                this.y = 100; // Start at top to show gravity
                this.vx = 0; // velocity x
                this.vy = 0; // velocity y
                this.radius = 30; // half of 60px width
                this.gravity = 0.6; // Stronger gravity
                this.airFriction = 0.99; // Air resistance
                this.groundFriction = 0.95; // Ground friction when bouncing
                this.bounceDamping = 0.82; // Energy loss on bounce
                this.isDragging = false;
                this.dragStartX = 0;
                this.dragStartY = 0;
                this.lastX = this.x;
                this.lastY = this.y;
                this.onGround = false;

                this.init();
            }

            init() {
                this.element.addEventListener('mousedown', (e) => this.startDrag(e));
                this.element.addEventListener('touchstart', (e) => this.startDrag(e));
                document.addEventListener('mousemove', (e) => this.drag(e));
                document.addEventListener('touchmove', (e) => this.drag(e));
                document.addEventListener('mouseup', (e) => this.endDrag(e));
                document.addEventListener('touchend', (e) => this.endDrag(e));

                this.updatePosition();
                this.animate();
            }

            startDrag(e) {
                this.isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                this.dragStartX = clientX;
                this.dragStartY = clientY;
                this.lastX = this.x;
                this.lastY = this.y;
                this.vx = 0;
                this.vy = 0;
            }

            drag(e) {
                if (!this.isDragging) return;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                this.x = this.lastX + (clientX - this.dragStartX);
                this.y = this.lastY + (clientY - this.dragStartY);

                // Constrain to window bounds while dragging
                this.x = Math.max(this.radius, Math.min(window.innerWidth - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(window.innerHeight - this.radius, this.y));

                this.updatePosition();
            }

            endDrag(e) {
                if (!this.isDragging) return;
                this.isDragging = false;

                const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

                // Calculate velocity from drag (faster throws)
                this.vx = (clientX - this.dragStartX) * 0.8;
                this.vy = (clientY - this.dragStartY) * 0.8;
            }

            animate() {
                if (!this.isDragging) {
                    // Apply gravity
                    this.vy += this.gravity;

                    // Apply air friction to both axes
                    this.vx *= this.airFriction;
                    
                    // Cap terminal velocity
                    if (this.vy > 15) this.vy = 15;

                    // Update position
                    this.x += this.vx;
                    this.y += this.vy;

                    // Collision detection and response
                    this.onGround = false;

                    // Left wall bounce
                    if (this.x - this.radius < 0) {
                        this.x = this.radius;
                        this.vx = Math.abs(this.vx) * this.bounceDamping;
                    }

                    // Right wall bounce
                    if (this.x + this.radius > window.innerWidth) {
                        this.x = window.innerWidth - this.radius;
                        this.vx = -Math.abs(this.vx) * this.bounceDamping;
                    }

                    // Floor (bottom) bounce - most important for gravity demo
                    if (this.y + this.radius >= window.innerHeight) {
                        this.y = window.innerHeight - this.radius;
                        this.onGround = true;
                        
                        // Bounce with energy loss
                        if (Math.abs(this.vy) > 0.5) {
                            this.vy = -Math.abs(this.vy) * this.bounceDamping;
                            // Apply ground friction to horizontal velocity
                            this.vx *= this.groundFriction;
                        } else {
                            // Come to rest on ground
                            this.vy = 0;
                            this.vx *= this.groundFriction;
                            // Stop rolling if very slow
                            if (Math.abs(this.vx) < 0.2) {
                                this.vx = 0;
                            }
                        }
                    }

                    this.updatePosition();
                }

                requestAnimationFrame(() => this.animate());
            }

            updatePosition() {
                this.element.style.left = (this.x - this.radius) + 'px';
                this.element.style.top = (this.y - this.radius) + 'px';
            }
        }

        // Initialize basketball when page loads
        window.addEventListener('load', () => {
            const ballElement = document.getElementById('basketball');
            new Basketball(ballElement);
        });

        // Create random sparkles
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3000);
        }

        // Create sparkles periodically
        setInterval(createSparkle, 300);
    </script>
</body>
</html>
